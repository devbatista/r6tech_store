x-rails-env: &rails_env
  RAILS_ENV: "${RAILS_ENV:-development}"
  DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-r6tech_store_development}"
  POSTGRES_HOST: db
  POSTGRES_USER: "${POSTGRES_USER:-postgres}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_TEXT_MODEL: "${OPENAI_TEXT_MODEL:-gpt-4.1-mini}"
  OPENAI_IMAGE_RESPONSE_MODEL: "${OPENAI_IMAGE_RESPONSE_MODEL:-gpt-4.1-mini}"
  MELHOR_ENVIO_BASE_URL: "${MELHOR_ENVIO_BASE_URL:-https://sandbox.melhorenvio.com.br}"
  MELHOR_ENVIO_TOKEN: "${MELHOR_ENVIO_TOKEN:-}"
  MELHOR_ENVIO_ORIGIN_POSTAL_CODE: "${MELHOR_ENVIO_ORIGIN_POSTAL_CODE:-}"
  MELHOR_ENVIO_USER_AGENT: "${MELHOR_ENVIO_USER_AGENT:-r6tech_store (contato@example.com)}"
  RAILS_LOG_TO_STDOUT: "${RAILS_LOG_TO_STDOUT:-true}"
  BOOTSNAP_CACHE_DIR: "/tmp/bootsnap-cache"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-r6tech_store_development}"
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  web:
    image: r6tech-store-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/rails server -b 0.0.0.0 -p 3000
    ports:
      - "${WEB_PORT:-80}:3000"
    depends_on:
      - db
      - redis
    environment:
      <<: *rails_env
      APP_HOST: "${APP_HOST:-r6tech.store-local}"
      APP_PORT: "${APP_PORT:-${WEB_PORT:-80}}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
    volumes:
      - .:/rails:cached
    stdin_open: true
    tty: true
    restart: unless-stopped

  sidekiq:
    image: r6tech-store-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
      - db
      - redis
    environment:
      <<: *rails_env
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
    volumes:
      - .:/rails:cached
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
